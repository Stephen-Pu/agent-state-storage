{{- if .Values.operator.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-operator
  labels: {{- include "kvcache.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kvcache
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kvcache
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: {{ .Release.Name }}-operator
      containers:
        - name: manager
          image: {{ include "kvcache.operatorImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--metrics-bind-address=:8080"
            - "--health-probe-bind-address=:8081"
            - "--leader-elect"
          ports:
            - { name: metrics, containerPort: 8080 }
            - { name: probe,   containerPort: 8081 }
          livenessProbe:
            httpGet: { path: /healthz, port: probe }
          readinessProbe:
            httpGet: { path: /readyz, port: probe }
          resources: {{- toYaml .Values.operator.resources | nindent 12 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-operator
rules:
  - apiGroups: ["kvcache.alluxio.io"]
    resources: ["kvcacheclusters", "kvcachetenants"]
    verbs: ["*"]
  - apiGroups: ["kvcache.alluxio.io"]
    resources: ["kvcacheclusters/status", "kvcachetenants/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "daemonsets", "deployments"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "serviceaccounts", "pods"]
    verbs: ["*"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-operator
    namespace: {{ .Release.Namespace }}
{{- end -}}
