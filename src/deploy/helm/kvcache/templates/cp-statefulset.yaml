apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-cp
  labels: {{- include "kvcache.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Release.Name }}-cp
  replicas: {{ .Values.controlPlane.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kvcache
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kvcache
        app.kubernetes.io/component: control-plane
    spec:
      containers:
        - name: control-plane
          image: {{ include "kvcache.cpImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--etcd-endpoints={{ include "kvcache.etcdEndpoints" . }}"
          env:
            - name: KVCACHE_ETCD_ENDPOINTS
              value: "{{ include "kvcache.etcdEndpoints" . }}"
          ports:
            - { name: grpc, containerPort: 9090 }
            - { name: metrics, containerPort: 8080 }
          resources: {{- toYaml .Values.controlPlane.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-cp
  labels: {{- include "kvcache.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: kvcache
    app.kubernetes.io/component: control-plane
  ports:
    - { name: grpc, port: 9090, targetPort: grpc }
    - { name: metrics, port: 8080, targetPort: metrics }
